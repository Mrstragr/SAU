version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: rectangle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rectangle
      POSTGRES_USER: rectangle
      POSTGRES_PASSWORD: rectangle
    ports:
      - "5432:5432"
    volumes:
      - rectangle_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rectangle -d rectangle"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: rectangle_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rectangle_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  rectangle_postgres_data:
  rectangle_redis_data:

